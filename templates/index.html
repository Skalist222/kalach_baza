<!DOCTYPE html>
<html>

    <head>
        <!-- Иконочки -->
        <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> -->

        <!-- Внутренние стили -->
        <link rel="stylesheet" href="/static/styles/style.css">
        <link rel="stylesheet" href="/static/styles/map_style.css">
        <link rel="stylesheet" href="/static/styles/modal.css">
    </head>

    <body>

        <div id="tooltip">
            <div id="visual_element"></div>
        </div>
        <div id="placementModal" class="modal">
            <div id="modal_content">
                <div id="modalText"></div>
                <div id="modal_buttons">
                </div>
            </div>
        </div>

        <div class="greed column">
            <div class="greed row left-panel">

                <div class="greed row box adder">
                    <div class="greed column">
                        <div>Заезд:</div>
                        <div>
                            <select id="currentArrival"
                                onchange="loadData()"></select>
                        </div>
                    </div>
                    <input id="arrivalName"
                        placeholder="Новый заезд">
                    <input id="arrivalCost" type="number" placeholder="Взнос">
                    <button onclick="addArrival()">
                        Добавить
                    </button>
                </div>

                <div class="greed row box">
                    <h3>Посетители</h3>
                    <div class="greed row box adder">

                        <h4>Добавить посетителя</h4>
                        <input id="visitorName" placeholder="ФИО">
                        <div class="greed column">
                            <div class="left-column w10p">д/р: </div>
                            <input class="rigth-column w90p" id="visitorDate"
                                type="date">
                        </div>
                        <input id="visitorPhone" placeholder="Телефон" type="phone">
                        <div>
                            <input type="radio" name="sex" id="sexMen" checked>М</input>
                            <input type="radio" name="sex" id="sexWomen">Ж</input>
                        </div>
                        <button onclick="addVisitor()">
                            Добавить
                        </button>
                    </div>
                    <div class="greed box row">
                        <input  id="sortVisitors" placeholder="Сортировка">
                        <div class="greed row">
                            <div class="row">
                                <div id="visitorList"></div>
                            </div>
                        </div>
                    </div>
      
                </div>

            </div>
            <div class="rigth-panel">
                <div class="greed row">
                    <div class=" greed row nongap">
                        <div id="current_arrival_name"></div>
                        <div id="current_arrival_cost"></div>
                    </div>
                    <div id="map"></div>
                </div>
                
            </div>
        </div>
         <script src="/static/js/modal.js"></script>
        <script src="/static/js/help.js"></script>
        <script src="/static/js/lists.js"></script>
        <script src="/static/js/api.js"></script>
        <script src="/static/js/render.js"></script>
        <script src="/static/js/script.js"></script>
    </body>

</html>
